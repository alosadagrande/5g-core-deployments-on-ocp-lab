apiVersion: local.storage.openshift.io/v1
kind: LocalVolume
metadata:
  name: local-block
  namespace: openshift-local-storage
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  nodeSelector:
    nodeSelectorTerms:
    - matchExpressions:
        - key: cluster.ocs.openshift.io/openshift-storage
          operator: In
          values:
          - ""
  storageClassDevices:
    - storageClassName: localblock
      volumeMode: Block
      devicePaths:
        - /dev/vdb
---
apiVersion: ocs.openshift.io/v1
kind: StorageCluster
metadata:
  name: ocs-storagecluster
  namespace: openshift-storage
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  enableCephTools: true
  network:
    ipFamily: IPv4
  hostNetwork: true
  managedResources:
    cephCluster:
      cleanupPolicy:
        wipeDevicesFromOtherClusters: true
  monDataDirHostPath: /var/lib/rook
  multiCloudGateway:
    reconcileStrategy: manage
  resources:
    mgr:
      requests:
        cpu: "1m"
        memory: 1Mi
    mds:
      requests:
        cpu: "1m"
        memory: 1Mi
    mon:
      requests:
        cpu: "1m"
        memory: 1Mi
    osd:
      requests:
        cpu: "1m"
        memory: 1Mi
    rgw:
      requests:
        cpu: "1m"
        memory: 1Mi
    noobaa-core:
      requests:
        cpu: "1m"
        memory: 1Mi
    crashcollector:
      requests:
        cpu: "1m"
        memory: 1Mi
    logcollector:
      requests:
        cpu: "1m"
        memory: 1Mi
    exporter:
      requests:
        cpu: "1m"
        memory: 1Mi
    mgr-sidecar:
      requests:
        cpu: "1m"
        memory: 1Mi
    ocs-metrics-exporter:
      requests:
        cpu: "1m"
        memory: 1Mi
    odf-blackbox-exporter:
      requests:
        cpu: "1m"
        memory: 1Mi
    kube-rbac-proxy-main:
      requests:
        cpu: "1m"
        memory: 1Mi
    kube-rbac-proxy-self:
      requests:
        cpu: "1m"
        memory: 1Mi
    ocs-provider-server:
      requests:
        cpu: "1m"
        memory: 1Mi
    rook-ceph-tools:
      requests:
        cpu: "1m"
        memory: 1Mi
    noobaa-db:
      requests:
        cpu: "1m"
        memory: 1Mi
    noobaa-db-vol:
      requests:
        storage: 5Gi
    noobaa-endpoint:
      requests:
        cpu: "1m"
        memory: 1Mi
  storageDeviceSets:
  - count: 1
    dataPVCTemplate:
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 1
        storageClassName: localblock
        volumeMode: Block
    name: ocs-deviceset
    placement: {}
    portable: false
    replica: 3
    resources:
      requests:
        cpu: "1m"
        memory: 1Mi